<!DOCTYPE html>
<html>
    <head>
        <title>Door operation</title>
        <style>
            body{
                text-align: center;
                font-family: 'Times New Roman', Times, serif;
                padding:50px;
            }
            h1{
                text-decoration: underline;
                color:goldenrod;
            }
            #container{
                background-color: aqua;
                display: inline-block;
                padding:30px;  

            }
            #doorImage{
                width:200px;
                height:200px;
                display:none;
                margin-top:20px;

            }
            button{
                padding: 10px 20px;
                font-size: 16px;
                margin:10px;
                color:blueviolet;
                background-color: magenta;
                font-weight: bold;

            }

        </style>
        <script>
            function selectdoor(door){
                let image=document.getElementById('doorImage');
                let container=document.getElementById('container');

                if(door==='open'){
                    image.src="https://images.unsplash.com/photo-1635945416566-6302b54c056b?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8b3BlbiUyMGRvb3J8ZW58MHx8MHx8fDA%3D";
                    container.style.backgroundColor='red';
                }
                else if(door==='close'){
                    image.src="https://images.pexels.com/photos/4291/door-green-closed-lock.jpg?cs=srgb&dl=pexels-life-of-pix-4291.jpg&fm=jpg";
                    container.style.backgroundColor='Black';
                }
                image.style.display='block';


            }

        </script>
    </head>
    <body>
        <div id="container">
        <h1>Door Selection</h1>
        <button onclick="selectdoor('open')">OPEN</button>
        <button onclick="selectdoor('close')">CLOSE</button>
        <div id="imagecontainer">
           <img id="doorImage" src="" alt="doorImage"/>
 </div>
</div>
    </body>
</html>
