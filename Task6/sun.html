<html>
    <head>
        <title>SUN</title>
        <style>
            body{
                text-align: center;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            }
            h1{
                color:red;
                text-decoration: underline;
                font-family: 'Times New Roman', Times, serif;
            }
            #container{
                display:inline-block;
                background-color: blue;
                padding:10px 20px;
                margin:50px;
        
            }
            #sunImage{

                display:none;
                padding:30px;
                height:200px;
                width:200px;
            }
            button{
                color:magenta;
                background-color: greenyellow;
                padding:10px 20px;
                font-weight: bold;
                margin:10px;
                cursor: pointer;

            }

        </style>
        <script>
            function selectsun(sun){
                let image=document.getElementById('sunImage');
                let container=document.getElementById('container');

                if (sun==='sunrise'){
                    image.src="https://media.istockphoto.com/id/1381637603/photo/mountain-landscape.jpg?s=612x612&w=0&k=20&c=w64j3fW8C96CfYo3kbi386rs_sHH_6BGe8lAAAFS-y4=";
                    container.style.backgroundColor='yellow';
            
                }
                else if(sun==='sunset'){
                    image.src="https://images.stockcake.com/public/5/f/9/5f9c2b86-0649-41ea-b6ae-bb07385c78f5_large/sunset-over-ocean-stockcake.jpg";
                    container.style.backgroundColor='orange';
                }
                image.style.display="block";

            }

        </script>
    </head>
    <body>
        <div id="container">
        <h1>SUN</h1>
        <button onclick="selectsun('sunrise')">SUNRISE</button>
        <button onclick="selectsun('sunset')">SUNSET</button>
        <div id="imagecontainer">
           <img id="sunImage" src="" alt="sunImage"/>


        </div>
        </div>

    </body>
</html>
